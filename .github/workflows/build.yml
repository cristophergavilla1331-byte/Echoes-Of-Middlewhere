name: Build Echoes of Middlewhere

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        run: |
          pip install pyinstaller windows-curses
      - name: Build exe
        run: pyinstaller --onefile --name EchoesOfMiddlewhere **/EOMwin.py

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        run: pip install pyinstaller
      - name: Build binary
        run: pyinstaller --onefile --name EchoesOfMiddlewhere **/EOMwin.py

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        run: pip install pyinstaller
      - name: Build binary
        run: pyinstaller --onefile --name EchoesOfMiddlewhere **/EOMwin.py
